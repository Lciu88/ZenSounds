<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>My Music</title>

        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background: #079c79;
                color: white;
                text-align: center;
            }

            .hero {
                padding: 80px 20px 40px;
            }

            h1 {
                font-size: 48px;
                margin-bottom: 10px;
                color: white;
                text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
            }

            p {
                color: #b3b3b3;
                max-width: 600px;
                margin: auto;
                color: white;
                text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
            }

            .playlist {
                max-width: 800px;
                margin: 40px auto;
                padding: 20px;
            }

            iframe {
                width: 100%;
                border: none;
            }

            .footer {
                padding: 40px;
                color: white;
                font-size: 14px;
                text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
            }
        </style>
    </head>

    <body>
        <section class="hero">
            <h1>ZenSounds</h1>
            <p>
                Atmospheric music for focus, relaxation and cinematic moments.
            </p>
        </section>

        <section class="playlist">
            <iframe
                style="border-radius: 12px"
                src="https://open.spotify.com/embed/playlist/18B5QENeAnTXTY5hU9lwWs?utm_source=generator"
                height="352"
                allowfullscreen=""
                allow="
                    autoplay;
                    clipboard-write;
                    encrypted-media;
                    fullscreen;
                    picture-in-picture;
                "
                loading="lazy"
            >
            </iframe>
        </section>

        <div class="footer">© 2026 ZenSounds</div>
    </body>
</html>
