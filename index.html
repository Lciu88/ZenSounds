        <style>
            /* 6. Fundal Animat Subtil */
            @keyframes gradientBG {
                0% {
                    background-position: 0% 50%;
                }
                50% {
                    background-position: 100% 50%;
                }
                100% {
                    background-position: 0% 50%;
                }
            }

            body {
                margin: 0;
                font-family: "Poppins", sans-serif; /* 1. Tipografie Modernă */
                background: linear-gradient(
                    -45deg,
                    #079c79,
                    #045e49,
                    #033d30,
                    #079c79
                );
                background-size: 400% 400%;
                animation: gradientBG 15s ease infinite;
                background-attachment: fixed;
                color: white;
                text-align: center;
                overflow-x: hidden;
            }

            /* 2. Efect de Glassmorphism */
            .hero {
                padding: 100px 20px 60px;
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                margin-bottom: 40px;
            }

            h1 {
                font-size: 64px;
                font-weight: 600;
                margin-bottom: 10px;
                letter-spacing: -1px;
                text-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            }

            .hero p {
                font-size: 18px;
                color: rgba(255, 255, 255, 0.8);
                max-width: 600px;
                margin: auto;
            }

            .hero a {
                color: #00ffc3;
                text-decoration: none;
                font-weight: 600;
                transition: color 0.3s;
            }

            .hero a:hover {
                color: white;
            }

            /* 3. Organizare și Titluri de Secțiuni */
            .section-title {
                font-size: 28px;
                font-weight: 600;
                margin: 60px 0 20px;
                position: relative;
                display: inline-block;
            }

            .section-title::after {
                content: "";
                position: absolute;
                bottom: -10px;
                left: 50%;
                transform: translateX(-50%);
                width: 50px;
                height: 3px;
                background: #00ffc3;
                border-radius: 2px;
            }

            .container {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
                gap: 30px;
                max-width: 1200px;
                margin: 0 auto;
                padding: 40px 20px;
            }

            /* 5. Animații la Scroll */
            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .fade-in {
                animation: fadeInUp 1s ease-out forwards;
                opacity: 0;
            }

            iframe {
                width: 100%;
                border: 2px solid white;
                border-radius: 16px;
                box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
                transition:
                    transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                    box-shadow 0.4s;
            }

            iframe:hover {
                transform: scale(1.03);
                box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
            }

            /* 4. Link-uri Social Media (YouTube) */
            .social-links {
                margin-top: 20px;
            }

            .social-btn {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                background: rgba(255, 255, 255, 0.1);
                color: white;
                padding: 12px 24px;
                border-radius: 30px;
                text-decoration: none;
                font-weight: 600;
                backdrop-filter: blur(5px);
                border: 1px solid rgba(255, 255, 255, 0.2);
                transition: all 0.3s;
            }

            .social-btn:hover {
                background: #ff0000;
                border-color: #ff0000;
                transform: translateY(-3px);
                box-shadow: 0 10px 20px rgba(255, 0, 0, 0.3);
            }

            .footer {
                padding: 60px 40px;
                background: rgba(0, 0, 0, 0.2);
                margin-top: 80px;
                font-size: 14px;
                color: rgba(255, 255, 255, 0.6);
            }
        </style>

        <!-- Mic script pentru a declanșa animațiile la scroll dacă sunt multe elemente -->
        <script>
            const observerOptions = {
                threshold: 0.1,
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = "1";
                        entry.target.classList.add("fade-in");
                    }
                });
            }, observerOptions);

            document
                .querySelectorAll(".fade-in")
                .forEach((el) => observer.observe(el));
        </script>
